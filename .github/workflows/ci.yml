name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: university-claw/mjuclaw-router

jobs:
  test:
    name: Check and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

  docker-build:
    name: Docker build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out mju-cli build context
        uses: actions/checkout@v4
        with:
          repository: university-claw/mju-cli
          ref: main
          path: mju-cli
          token: ${{ secrets.CI_REPO_READ_TOKEN || github.token }}

      - name: Check out mju-news build context
        uses: actions/checkout@v4
        with:
          repository: university-claw/mju-public-data-reader
          ref: main
          path: mju-news
          token: ${{ secrets.CI_REPO_READ_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and optionally publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          build-contexts: |
            mju-cli=./mju-cli
            mju-news=./mju-news
          load: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
